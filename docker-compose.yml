version: '3.8'

services:
  gigmarket-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gigmarket_service
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./db:/app/db
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
